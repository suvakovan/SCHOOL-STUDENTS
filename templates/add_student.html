{% extends 'base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="page-header">
    <h2>{% if student %}✏️ Edit Student{% else %}➕ Add Student{% endif %}</h2>
    <a href="{% url 'student_list' %}" class="btn btn-gray">← Back</a>
</div>

<div class="form-card">
    <form method="POST" class="form" novalidate>
        {% csrf_token %}
        {% for field in form %}
        <div class="form-group">
            <label>{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
            <span class="field-error">{{ field.errors.0 }}</span>
            {% endif %}
        </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary btn-block">
            {% if student %}💾 Update{% else %}✅ Save Student{% endif %}
        </button>
    </form>
</div>
{% endblock %}
